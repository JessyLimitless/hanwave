<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노자 도덕경 81장 · 유진이의 한자교실</title>
  <meta name="description" content="노자 도덕경 81장을 게임으로. 원문 낭독·핵심어·짝 맞추기와 유진이의 쉬운 풀이로 도(道)의 지혜를 배워요." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8A%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="noja.css" />
</head>
<body>
  <!-- 상단 바 -->
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="index.html" title="유진이의 한자교실 홈으로">
        <div class="logo">水</div>
        <div class="t">
          <h1>노자 도덕경</h1>
          <span>← 유진이의 한자교실</span>
        </div>
      </a>
      <div class="hud">
        <div class="progress-pill" id="prog-count">도장 <b>0</b> / 81</div>
        <button id="btn-reset" class="sound-toggle" title="진행 초기화" aria-label="진행 초기화">↺</button>
        <button id="sound-toggle" class="sound-toggle" title="소리 켜기/끄기" aria-label="소리 켜기/끄기" aria-pressed="false">🔊</button>
      </div>
    </div>
  </header>

  <!-- 인트로 -->
  <section class="intro">
    <div class="wrap">
      <span class="eyebrow">✦ 물처럼 흐르는 지혜 ✦</span>
      <h2><span class="han">老子</span> 도덕경 81장</h2>
      <p>글자는 적어도 뜻은 깊어요. 원문을 소리 내어 읽고, 핵심어와 짝을 맞추고, 유진이의 풀이로 도(道)의 마음을 만나요.</p>
      <div class="dao-meter">
        <div class="bar"><div class="fill" id="dao-fill"></div></div>
        <div class="lab" id="dao-lab"><span>도(道)의 길</span><span><b>0</b> / 81 장</span></div>
      </div>
      <div class="intro-actions">
        <button id="btn-resume" class="resume-btn">▶ 이어서 풀기</button>
      </div>
      <div id="complete-banner" class="complete-banner hidden">🏆 도덕경 81장 완독! 도(道)의 길을 모두 걸었어요.</div>
    </div>
  </section>

  <!-- 도(道)의 길: 81 디딤돌 -->
  <section class="path-section">
    <div class="wrap">
      <div class="stones" id="stones"></div>
    </div>
  </section>

  <footer class="footer">
    <b>유진이의 한자교실</b> · 노자 도덕경 — 물빛처럼 잔잔하게, 한 장씩 천천히
  </footer>

  <!-- 팝업 오버레이 -->
  <div id="overlay" class="overlay hidden"><div id="popup" class="popup"></div></div>
  <div id="toast" class="toast"></div>

  <script src="noja-data.js"></script>
  <script src="noja-full.js"></script>
  <script src="noja.js"></script>
</body>
</html>

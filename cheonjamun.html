<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>천자문 어드벤처: 마법의 팝업</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%80%84%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 상태바 (게임 HUD) -->
    <header class="topbar">
      <a class="brand" href="index.html" title="유진이의 한자교실 홈으로" style="text-decoration:none; color:inherit">
        <div class="logo">🀄</div>
        <div class="brand-text">
          <h1>천자문 어드벤처</h1>
          <span class="sub">← 유진이의 한자교실</span>
        </div>
      </a>

      <div class="hud">
        <div class="hud-level">
          <span class="rank-badge" id="rank">초동달인</span>
          <div class="level-block">
            <div class="level-line">
              <span id="level-label">Lv.1</span>
              <span id="exp-label">0 / 50 XP</span>
            </div>
            <div class="xpbar"><div class="xpbar-fill" id="xpbar"></div></div>
          </div>
        </div>
        <div class="hud-stats">
          <span class="stat">🃏 <b id="collected">0 / 1000</b></span>
          <span class="stat">💰 <b id="gold">0</b></span>
        </div>
      </div>
    </header>

    <!-- 탭 네비 -->
    <nav class="nav">
      <button data-view="map" class="active">🗺️ 월드맵</button>
      <button data-view="collection">🃏 카드 도감</button>
      <button data-view="wrong">🪄 오답서</button>
      <button id="btn-reset" style="margin-left:auto">↺ 초기화</button>
    </nav>

    <!-- 뷰: 월드맵 -->
    <section id="view-map" class="panel"></section>
    <!-- 뷰: 카드 도감 -->
    <section id="view-collection" class="panel hidden"></section>
    <!-- 뷰: 오답서 -->
    <section id="view-wrong" class="panel hidden"></section>
  </div>

  <!-- 마법 팝업 오버레이 -->
  <div id="overlay" class="overlay hidden">
    <div id="popup" class="popup"></div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast"></div>

  <script src="data-lore-101.js"></script>
  <script src="data-lore-101b.js"></script>
  <script src="data-lore-c1.js"></script>
  <script src="data-lore-c2.js"></script>
  <script src="data-lore-v2.js"></script>
  <script src="data.js"></script>
  <script src="effects.js"></script>
  <script src="game.js"></script>
</body>
</html>
